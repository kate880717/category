              <span class="setup-step-num" style="background:linear-gradient(135deg, #3B82F6, #1D4ED8);">2</span>
              <span class="setup-step-title">📦 분류함 이름 (2개 이상)</span>
              <div style="margin-left:auto; display:flex; gap:6px; align-items:center;">
                <span style="font-family:var(--font-body); font-size: clamp(25px, 2.8vh, 30px); color:#0C4A6E;">자동:</span>
                <button class="auto-toggle ${a4State.autoBins ? 'on' : 'off'}" onclick="toggleAutoBins()">
                  ${a4State.autoBins ? '✅ ON' : 'OFF'}
                </button>
              </div>
            </div>
            <div class="bin-inputs" id="bin-inputs">
              ${a4State.bins.map((b, i) => `
                <div class="bin-input-wrap">
                  <span style="color:#3B82F6; font-family:var(--font-display); font-size: clamp(30px, 3.3vh, 32px); flex-shrink:0;">${i + 1}.</span>
                  <input type="text" placeholder="✏️ 적기" value="${b.label}" 
                    oninput="a4State.bins[${i}].label = this.value; if(a4State.autoBins){a4State.autoBins=false; const t=document.querySelector('.auto-toggle'); if(t){t.textContent='OFF'; t.classList.remove('on'); t.classList.add('off');}}">
                </div>
              `).join('')}
            </div>
          </div>
          
          <button class="btn-main" onclick="startSorting()" style="flex-shrink:0;">🚀 분류 시작! ${ICONS.arrow}</button>
        </div>
      `);
      if (a4State.completedRounds === 0) {
        autoReadScreen('내가 분류 기준을 정해요. 어떤 점이 비슷한 블록끼리 모을지 정해보세요.');
      } else {
        autoReadScreen('다른 기준으로 다시 해볼까요? 기준이 다르면 결과도 달라져요.');
      }
    }

    function applyPreset(key) {
      playSfx('click');
      a4State.presetKey = key;
      a4State.criterion = PRESET_CRITERIA[key].label;
      
      if (a4State.autoBins) {
        const labels = Object.values(PRESET_CRITERIA[key].binLabels);
        a4State.bins = labels.map((l, i) => ({ id: 'b' + (i + 1), label: l, items: [] }));
        while (a4State.bins.length < 4) {
          a4State.bins.push({ id: 'b' + (a4State.bins.length + 1), label: '', items: [] });
        }
      }
      renderA4Setup();
    }

    function toggleAutoBins() {
      playSfx('click');
      a4State.autoBins = !a4State.autoBins;
      if (a4State.autoBins && a4State.presetKey) {
        const labels = Object.values(PRESET_CRITERIA[a4State.presetKey].binLabels);
        a4State.bins = labels.map((l, i) => ({ id: 'b' + (i + 1), label: l, items: [] }));
        while (a4State.bins.length < 4) {
          a4State.bins.push({ id: 'b' + (a4State.bins.length + 1), label: '', items: [] });
        }
      }
      renderA4Setup();
    }

    function startSorting() {
      if (!a4State.criterion.trim()) {
        showModal(`
          <div style="font-size:90px; line-height:1;">✏️🤔</div>
          <h2 class="modal-title">분류 기준을 적어주세요!</h2>
          <p class="modal-body">
            먼저 <strong>STEP 1</strong>에서<br/>
            <span class="hi-pink">"색깔" 같은 분류 기준</span>을 적거나,<br/>
            아래 <strong>추천 버튼</strong>을 눌러주세요! 💖
          </p>
          <button class="btn-secondary" onclick="closeModal()">😊 알겠어요!</button>
        `);
        return;
      }
      const filled = a4State.bins.filter(b => b.label.trim());
      if (filled.length < 2) {
        showModal(`
          <div style="font-size:90px; line-height:1;">📝🤗</div>
          <h2 class="modal-title">분류함이 더 필요해요!</h2>
          <p class="modal-body">
            분류함 이름을 <span class="hi-blue"><strong>2개 이상</strong></span> 적어주세요!<br/>
            <small>(예: 빨강 / 파랑 / 노랑)</small>
          </p>
          <button class="btn-secondary" onclick="closeModal()">😊 알겠어요!</button>
        `);
        return;
      }
      playSfx('click');
      a4State.bins = filled;
      a4State.setupDone = true;
      renderA4Sort();
    }

    function renderA4Sort() {
      const blocks = shuffle((STATE.data.activity4Blocks || []).map(b => ({
        id: b.ID, color: b.색깔, shape: b.모양, size: b.크기
      })));
      a4State.activeBlocks = blocks;
      a4State.bins.forEach(b => b.items = []);
      const binColors = ['rose', 'emerald', 'amber', 'sky', 'violet', 'orange'];
      
      // 탐구 질문 - 사용자가 정한 기준 사용
      const inquiryQuestion = `🤔 ${a4State.criterion}이(가) 어떤가요?`;
      window.CURRENT_INQUIRY_QUESTION = inquiryQuestion;
      
      showScreen(`
        ${renderHeader({ number: 4, title: '🧱 내가 분류 기준을 정해요!', criterionLabel: a4State.criterion, fixed: false })}
        ${renderTutorial(`<span class="hi-yellow"><strong>"${a4State.criterion}"</strong></span> 기준으로 분류해 봐요! 🎯`)}
        ${renderFeedback(
          inquiryQuestion,
          'thinking',
          '👆 블록을 콕! 눌러서 골라주세요'
        )}
        <div class="sort-main">
          <div class="item-tray">
            <span class="tray-label">🧱 블록 (${blocks.length}개)</span>
            <div class="tray-items" id="block-tray"></div>
          </div>
          <div class="bins-column" style="--bin-count:${a4State.bins.length}">
            ${a4State.bins.map((b, i) => `
              <div class="drop-bin bin-${binColors[i % binColors.length]}" id="${b.id}">
                <div class="bin-label-row">
                  <span class="bin-label">${b.label}</span>
                  <span class="bin-count" id="count-${b.id}">(0개)</span>
                </div>
                <div class="bin-items" id="items-${b.id}"></div>
              </div>
            `).join('')}
          </div>
        </div>
      `);
      renderA4Blocks();
      autoReadScreen(`${a4State.criterion} 기준으로 분류해봐요`);
    }

    function renderA4Blocks() {
      const tray = document.getElementById('block-tray');
      if (!tray) return;
      tray.innerHTML = '';
      a4State.activeBlocks.forEach(block => {
        const el = document.createElement('div');
        el.className = 'draggable-item';
        el.style.padding = '10px';
        el.innerHTML = BlockSvg({ 색깔: block.color, 모양: block.shape, 크기: block.size }, 60);
        tray.appendChild(el);
        makeDraggable(el, (binId) => handleA4Drop(block, binId, el));
      });
    }

    function handleA4Drop(block, binId, itemEl) {
      const bin = a4State.bins.find(b => b.id === binId);
      if (!bin) return;
      
      // 추천 기준 사용 시 정답 검증
      if (a4State.presetKey) {
        const expectedValue = block[a4State.presetKey]; // color/shape
        const expectedLabel = PRESET_CRITERIA[a4State.presetKey].binLabels[expectedValue];
        if (bin.label !== expectedLabel) {
          // 틀림!
          const sadMsgs = [
            `🤔 다른 칸이 더 어울려요! 잘 봐봐요 🔍`,
            `😅 음~ 다시 한번 보고 옮겨봐요! 💪`,
            `🧐 다른 곳도 살펴볼까요? 🔎`
          ];
          updateFeedback(sadMsgs[Math.floor(Math.random() * sadMsgs.length)], 'sad');
          playSfx('wrong');
          speak('다른 칸이 더 어울려요');
          return;
        }
      }
      
      // 정답이거나 자유 분류
      a4State.activeBlocks = a4State.activeBlocks.filter(b => b.id !== block.id);
      bin.items.push(block);
      const itemsContainer = document.getElementById('items-' + binId);
      const placed = document.createElement('div');
      placed.className = 'bin-item';
      placed.innerHTML = BlockSvg({ 색깔: block.color, 모양: block.shape, 크기: block.size }, 32);
      itemsContainer.appendChild(placed);
      const countEl = document.getElementById('count-' + binId);
      if (countEl) countEl.textContent = `(${itemsContainer.children.length}개)`;
      itemEl.remove();
      renderA4Blocks();
      const happyMsgs = ['👍 좋아요!', '🌟 잘했어요!', '✨ 멋져요!', '💕 굿!'];
      updateFeedback(happyMsgs[Math.floor(Math.random() * happyMsgs.length)], 'happy');
      playSfx('correct');
      
      if (a4State.activeBlocks.length === 0) {
        a4State.completedRounds++;
        STATE.scores.a4 = a4State.completedRounds;
        setTimeout(() => {
          const msg = a4State.completedRounds === 1
            ? `🎉 분류 완료! 다른 기준으로도 해볼까요?`
            : `🎊 또 다른 기준으로도 분류했어요!`;
          updateFeedback(msg, 'happy');
          playSfx('success');
          speak('분류 완료');
          fireConfetti();
          const tray = document.getElementById('block-tray');
          tray.innerHTML = `
            <div style="display:flex; flex-direction:column; gap:14px; align-items:center; padding:12px;">
              <button class="btn-secondary" onclick="screenActivity4()">${ICONS.retry} 다른 기준으로 다시</button>
              ${a4State.completedRounds >= 1 ? `
                <button class="btn-main" style="max-width:340px;" onclick="onActivity4Complete()">
                  🎈 마무리하기 ${ICONS.arrow}
                </button>
              ` : ''}
            </div>
          `;
        }, 600);
      }
    }

    function onActivity4Complete() {
      playSfx('click');
      screenPostRecord(0);
    }

              ${STATE.speakerOn ? ICONS.speakerOn : ICONS.speakerOff}
            </button>
          </div>
        `);
        autoReadScreen('오늘 분류 활동은 얼마나 재미있었나요? 재미있었던 만큼 별을 눌러주세요.');
      }
      // 모든 별 강조 효과를 1.1배 transform으로 처리하므로 fill만 바꾸면 됨
      window.setRating = (n) => {
        playSfx('click');
        rating = n;
        STATE.selfRating = n;
        document.querySelectorAll('.star-btn').forEach(btn => {
          const v = parseInt(btn.dataset.rating);
          btn.classList.toggle('filled', v <= n);
        });
        const texts = ['',
          '많이 어려웠어요',
          '조금 어려웠어요',
          '괜찮았어요',
          '재미있었어요',
          '아주 재미있었어요'
        ];
        const emojis = ['', '😢', '😕', '🙂', '😊', '🤩'];
        document.getElementById('rating-text').innerHTML = `${emojis[n]} ${texts[n]}`;
        document.getElementById('rating-submit').disabled = false;
      };
      window.submitRating = async () => {
        playSfx('click');
        const totalSec = Math.round((Date.now() - STATE.startTime) / 1000);
        try {
          await gasPost({
            action: 'saveResult',
            studentId: STATE.studentId,
            studentName: STATE.studentName,
            activity1Score: STATE.scores.a1,
            activity2Score: STATE.scores.a2,
            activity3Score: STATE.scores.a3,
            activity4Count: STATE.scores.a4,
            selfRating: STATE.selfRating,
            retryCount: STATE.retryCount,
            totalSeconds: totalSec
          });
        } catch (err) { console.error(err); }
        if (STATE.selfRating <= 3 && STATE.retryCount === 0) {
          screenRetryOption();
        } else {
          screenStamp();
        }
      };
      render();
    }

    function downloadStamp() {
      playSfx('click');
      const canvas = document.createElement('canvas');
      canvas.width = 600; canvas.height = 600;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 600);
      grad.addColorStop(0, '#FFFBEB'); grad.addColorStop(1, '#FEF3C7');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 600, 600);
      ctx.strokeStyle = '#6366F1'; ctx.lineWidth = 12;
      ctx.strokeRect(20, 20, 560, 560);
      ctx.strokeStyle = '#FBBF24'; ctx.lineWidth = 4;
      ctx.strokeRect(35, 35, 530, 530);
      ctx.strokeStyle = '#6366F1'; ctx.lineWidth = 18;
      ctx.beginPath(); ctx.arc(300, 280, 200, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#6366F1'; ctx.textAlign = 'center';
      ctx.font = 'bold 48px sans-serif';
      ctx.fillText('🏆 임명장 🏆', 300, 130);
      ctx.font = 'bold 32px sans-serif';
      ctx.fillText('분류 탐구 마스터', 300, 240);
      ctx.fillStyle = '#1E293B';
      ctx.font = 'bold 36px sans-serif';
      ctx.fillText(STATE.studentName, 300, 310);
      ctx.font = '20px sans-serif'; ctx.fillStyle = '#64748B';
      ctx.fillText('위 학생은 분류하기 활동을', 300, 360);
      ctx.fillText('멋지게 완수하였기에', 300, 390);
      ctx.fillText('이 임명장을 드립니다.', 300, 420);
      ctx.font = '60px sans-serif';
      ctx.fillText('🌟', 300, 480);
      const now = new Date();
      ctx.font = '18px sans-serif'; ctx.fillStyle = '#94A3B8';
      ctx.fillText(`${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`, 300, 540);
      const link = document.createElement('a');
      link.download = `분류박물관_${STATE.studentName}_임명장.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
